version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j-graphrag
    ports:
      - "7474:7474"   # Neo4j Browser (web UI)
      - "7687:7687"   # Bolt protocol (Python driver)
    environment:
      NEO4J_AUTH: neo4j/graphrag2026
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

volumes:
  neo4j-data:
